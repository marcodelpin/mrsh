<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="32" fill="#0d1117"/>

  <!-- Single thin horizontal line -->
  <line x1="96" y1="310" x2="416" y2="310" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Main text: rsh -->
  <text x="148" y="290" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="96" font-weight="700" fill="#f74c00" letter-spacing="-2">r</text>
  <text x="216" y="290" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="96" font-weight="700" fill="#7cba55" letter-spacing="-2">s</text>
  <text x="284" y="290" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="96" font-weight="700" fill="#00d4aa" letter-spacing="-2">h</text>

  <!-- Blinking cursor -->
  <rect x="352" y="236" width="4" height="56" fill="#00d4aa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="256" y="344" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="13" font-weight="400" fill="#ffffff" opacity="0.2" text-anchor="middle"
        letter-spacing="6">REMOTE SHELL</text>

</svg>
