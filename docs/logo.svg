<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="32" fill="#0d1117"/>

  <!-- Single thin horizontal line -->
  <line x1="96" y1="310" x2="416" y2="310" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Main text: mrsh -->
  <!-- Use single text element for uniform monospace spacing -->
  <text y="290" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="96" font-weight="700" letter-spacing="18">
    <tspan x="88" fill="#f97316">m</tspan><tspan fill="#ef4444">r</tspan><tspan fill="#7cba55">s</tspan><tspan fill="#00d4aa">h</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="376" y="236" width="4" height="56" fill="#00d4aa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="256" y="344" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace"
        font-size="11" font-weight="400" fill="#ffffff" opacity="0.2" text-anchor="middle"
        letter-spacing="4">MARCO RUST SECURE SHELL</text>

</svg>
